<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tmpstpdwn</title>
    <style>
        /* CSS Variables for Theme Switching */
        :root {
            --bg-color: #ffffff;
            --text-main: #222222;
            --text-muted: #888888;
            --text-light: #cccccc;
            --border-color: #eeeeee;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-main: #eeeeee;
            --text-muted: #aaaaaa;
            --text-light: #555555;
            --border-color: #333333;
        }

        /* Global Reset & Typography */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace; /* Monospace to match design */
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            line-height: 1.6;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
        }

        /* Header / Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-nav {
            font-size: 1rem;
            color: var(--text-light);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        nav a {
            text-decoration: none;
            color: var(--text-light);
        }

        /* Sharp Theme Switcher */
        #theme-toggle {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-light);
            border-radius: 0; /* Sharp edges */
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        #theme-toggle:hover {
            border-color: var(--text-main);
        }

        /* Main Content */
        h1 {
            font-size: 2.5rem;
            font-weight: normal;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .bio {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 650px;
            margin-bottom: 4rem;
            line-height: 1.8;
        }

        /* Footer / Links */
        .elsewhere-title {
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .social-links {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .social-links a {
            text-decoration: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .social-links a:hover {
            color: var(--text-main);
        }

        /* Recreating the bracketed icon look from the image */
        .icon-placeholder {
            display: inline-block;
            border: 1px solid var(--border-color);
            padding: 0.1rem 0.3rem;
            font-size: 0.7rem;
            color: var(--text-light);
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-nav">Tmpstpdwn</div>
            <nav>
                <button id="theme-toggle" aria-label="Toggle Dark Mode">☾</button>
            </nav>
        </header>

        <main>
            <h1>Suryakiran.M</h1>
            
            <p class="bio">
                Physics grad with an interest in low level systems. Interested in compilers, game engines, and the unix philosophy.
            </p>

            <section class="elsewhere">
                <div class="elsewhere-title">ELSEWHERE</div>
                <div class="social-links">
                    <a href="https://github.com/tmpstpdwn"><span class="icon-placeholder">GH</span> github</a>
                    <a href="https://reddit.com/u/tempestpdwn"><span class="icon-placeholder">RD</span> Reddit</a>
                    <a href="mailto:tmpstpdwn@proton.me"><span class="icon-placeholder">EM</span> email</a>
                    <a href="https://www.linkedin.com/in/srykrnm/"><span class="icon-placeholder">IN</span> linkedin</a>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme');

        // Check local storage for previous preferences
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                themeToggleBtn.textContent = 'L';
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeToggleBtn.textContent = 'D';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggleBtn.textContent = 'L';
            }
        });
    </script>
</body>
</html>
